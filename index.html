<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QANHNO1 | Thuê Bot Telegram 𝙌𝘼𝙉𝙃𝙑𝙉𝘽𝙊𝙏𝙑𝙄𝙋🇻🇳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ============ NỘI DUNG CHÍNH ============ */
        .main-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 20px 0;
        }

        .top-header {
            text-align: center;
            margin-bottom: 10px;
        }

        /* Tên shop phát sáng nhẹ */
        .shop-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1ea8e0;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-shadow: 0 0 15px rgba(30, 168, 224, 0.5), 0 0 30px rgba(30, 168, 224, 0.2);
        }

        /* Tên bot phát sáng nhẹ */
        .bot-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1ea8e0;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(30, 168, 224, 0.4);
        }

        .divider-line {
            width: 80px;
            height: 2px;
            background: #1ea8e0;
            margin: 12px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(30, 168, 224, 0.5);
        }

        /* ============ KHUNG KEY NGÀY (MỚI THÊM) ============ */
        .free-card-wrapper {
            width: 100%;
        }

        .free-card {
            width: 100%;
            background: #0a0a0a;
            border: 2px solid #ffaa00;
            border-radius: 24px;
            padding: 40px 30px 36px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.15), 0 0 40px rgba(255, 170, 0, 0.05), inset 0 0 20px rgba(255, 170, 0, 0.03);
        }

        .free-card:hover {
            border-color: #ffbb22;
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.25), 0 0 60px rgba(255, 170, 0, 0.1), inset 0 0 30px rgba(255, 170, 0, 0.05);
            transform: translateY(-2px);
        }

        .free-card .card-icon {
            font-size: 3.5rem;
        }

        .free-card .card-title {
            font-size: 2.8rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.2;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .free-card .card-subtitle {
            font-size: 1rem;
            color: #9ba1ad;
        }

        /* Nút Lấy Free - màu vàng cam */
        .free-btn {
            display: inline-block;
            background: #ffaa00;
            color: #000000;
            font-size: 1.4rem;
            font-weight: 800;
            padding: 16px 48px;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.4), 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .free-btn:hover {
            background: #ffbb22;
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.6), 0 6px 20px rgba(0, 0, 0, 0.5);
            transform: scale(1.03);
        }

        .free-btn:active {
            transform: scale(0.97);
        }

        /* ============ 2 KHUNG DƯỚI ============ */
        .cards-wrapper {
            display: flex;
            gap: 30px;
            width: 100%;
            flex-wrap: wrap;
        }

        /* Khung viền xanh phát sáng nhẹ */
        .card {
            flex: 1;
            min-width: 280px;
            background: #0a0a0a;
            border: 2px solid #1ea8e0;
            border-radius: 24px;
            padding: 50px 30px 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            transition: all 0.2s ease;
            box-shadow: 0 0 20px rgba(30, 168, 224, 0.15), 0 0 40px rgba(30, 168, 224, 0.05), inset 0 0 20px rgba(30, 168, 224, 0.03);
        }

        .card:hover {
            border-color: #3db8e8;
            box-shadow: 0 0 30px rgba(30, 168, 224, 0.25), 0 0 60px rgba(30, 168, 224, 0.1), inset 0 0 30px rgba(30, 168, 224, 0.05);
            transform: translateY(-2px);
        }

        .card .card-icon {
            font-size: 3.5rem;
        }

        /* Chữ trong khung phát sáng nhẹ */
        .card .card-title {
            font-size: 2.8rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.2;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .card .card-subtitle {
            font-size: 1rem;
            color: #9ba1ad;
        }

        /* Nút MUA Ở ĐÂY - phát sáng nhẹ */
        .buy-btn {
            display: inline-block;
            background: #1ea8e0;
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 800;
            padding: 16px 48px;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(30, 168, 224, 0.4), 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .buy-btn:hover {
            background: #28b4ec;
            box-shadow: 0 0 25px rgba(30, 168, 224, 0.6), 0 6px 20px rgba(0, 0, 0, 0.5);
            transform: scale(1.03);
        }

        .buy-btn:active {
            transform: scale(0.97);
        }

        .footer-note {
            text-align: center;
            color: #555;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .footer-note a {
            color: #1ea8e0;
            text-decoration: none;
            font-weight: 600;
            text-shadow: 0 0 6px rgba(30, 168, 224, 0.3);
        }

        .footer-note a:hover {
            color: #3db8e8;
        }

        @media (max-width: 650px) {
            .cards-wrapper {
                flex-direction: column;
                gap: 24px;
            }
            .free-card {
                padding: 36px 20px 30px;
            }
            .card {
                padding: 40px 20px 32px;
            }
            .free-card .card-title,
            .card .card-title {
                font-size: 2.2rem;
            }
            .free-btn,
            .buy-btn {
                font-size: 1.2rem;
                padding: 14px 36px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NỘI DUNG CHÍNH ===== -->

</body>
</html>
